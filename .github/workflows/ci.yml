name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  client:
    name: Client Quality Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_PWA_URL: https://app.example.com
      NEXT_PUBLIC_EVENT_IMAGE_PLACEHOLDER_URL: https://placehold.co/400x250/e2e8f0/64748b?text=Event+Image
      NEXT_PUBLIC_EVENT_BANNER_PLACEHOLDER_URL: https://placehold.co/1200x400/e2e8f0/64748b?text=Event+Banner
      NEXT_PUBLIC_GOOGLE_CALENDAR_BASE_URL: https://calendar.google.com/calendar/render?action=TEMPLATE
      NEXT_PUBLIC_REMOTE_IMAGE_HOSTS: placehold.co,example.supabase.co
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build app
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev

  server:
    name: Server Quality Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      NODE_ENV: test
      APP_URL: http://localhost:3000
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Audit production dependencies
        run: npm audit --omit=dev
